# try to set default
$TERMINAL = ghostty
$BROWSER = helium-browser

# ▄▀█ █░█ █▀▄ █ █▀█
# █▀█ █▄█ █▄▀ █ █▄█
binde=, XF86AudioRaiseVolume, exec, swayosd-client --output-volume 5
binde=, XF86AudioLowerVolume, exec, swayosd-client --output-volume -5
binde=, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind=, XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bind=, XF86AudioPause, exec, swayosd-client --playerctl play-pause
bind=, XF86AudioNext, exec, swayosd-client --playerctl next
bind=, XF86AudioPrev, exec, swayosd-client --playerctl previous

bind = SUPER, up, exec, swayosd-client --output-volume 5
bind = SUPER, down, exec, swayosd-client --output-volume -5

# █▀ █▀▀ █▀█ █▀▀ █▀▀ █▄░█ █▀ █░█ █▀█ ▀█▀
# ▄█ █▄▄ █▀▄ ██▄ ██▄ █░▀█ ▄█ █▀█ █▄█ ░█░
bind = , PRINT, exec, grim -o ~/Pictures/screenshots/capture_$(date '+%Y-%m-%d_%H-%M-%S').png && notify-send "Screenshot saved to default folder"
#bind = SUPERSHIFT, S, exec, ~/.config/scripts/screenshot_custom

bindr = SUPER, R, exec, killall rofi || rofi -show drun -theme ~/.config/rofi/global/custom.rasi

# below needs a wrapper to make sure that mousenav is automatically set up when activated and then restores previous profile when exited
bindr = SUPER, W, exec, pkill -USR1 toggle_waybar

#uncreachable from controller atm
# the gdbus command is used to reset the controller to generic config
# it assumes you only have one controller plugged in and that the generic profile is the first one
bind = SUPER, Q, killactive,
bind = SUPERSHIFT, S, exec, gdbus call --session --dest io.github.antimicrox --object-path /InputDevice/0 --method io.github.antimicrox.InputDevice.setActiveSetNumber 0

# fullscreen/floating stuff
bind = SUPER, F, fullscreen,
#bind = SUPER, F, togglefloating,

# monocle
bind = SUPERSHIFT, right, layoutmsg, cyclenext
bind = SUPERSHIFT, left, layoutmsg, cycleprev

# below stuff is not relevant for tv system, however im leaving some way to return to workspace 1 in case something fucked up happens

