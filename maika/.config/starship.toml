format = """
[в–‘в–’в–“](#574572)\
[ у°Ӣҷ ](bg:#574572 fg:#ffffff)\
[оӮҙ](bg:#705A94 fg:#574572)\
$directory\
[оӮҙ](fg:#705A94 bg:#8A6FB6)\
$git_branch\
$git_status\
[оӮҙ](fg:#8A6FB6 bg:#A484D8)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#A484D8 bg:#AA89E0)\
$python\
[оӮҙ](fg:#A484D8 bg:#AA89E0)\
$time\
[оӮҙ ](fg:#AA89E0)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#A484D8"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#574572"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#574572"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#3D3150"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#3D3150"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#3D3150"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#3D3150"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оңј"
style = "bg:#3D3150"
format = '[[ $symbol ($virtualenv) ($version) ](fg:#769ff0 bg:#212736)]($style)'
pyenv_version_name = false

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#574572"
format = '[[ пҗә $time ](fg:#A484D8 bg:#574572)]($style)'
